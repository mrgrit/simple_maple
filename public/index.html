<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심플 메이플 MMO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%234aa3ff'/></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; }

    /* 게임 캔버스가 들어갈 컨테이너 */
    #game { width: 100vw; height: 100vh; }

    /* 로그인(닉네임 입력) 오버레이 */
    #login {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, #2a2a4a 0%, #0f0f1a 100%);
      color: #eee; gap: 18px;
    }
    #login h1 { font-size: 34px; letter-spacing: 2px; color: #ffd966; text-shadow: 0 2px 8px #000; }
    #login p { color: #aab; font-size: 14px; }
    #login .row { display: flex; gap: 10px; }
    #nick, #pw {
      padding: 12px 16px; font-size: 16px; border: 2px solid #4a4a6a; border-radius: 8px;
      background: #1a1a2e; color: #fff; outline: none; width: 220px;
    }
    #nick:focus, #pw:focus { border-color: #ffd966; }
    #login .fields { display: flex; flex-direction: column; gap: 10px; }
    #loginErr { min-height: 18px; color: #ff6b6b; font-size: 13px; font-weight: bold; }
    #startBtn {
      padding: 12px 22px; font-size: 16px; font-weight: bold; cursor: pointer;
      border: none; border-radius: 8px; background: #ffd966; color: #222;
      transition: transform .05s ease, background .15s ease;
    }
    #startBtn:hover { background: #ffe289; }
    #startBtn:active { transform: scale(0.96); }
    .hint { margin-top: 8px; font-size: 13px; color: #889; line-height: 1.6; text-align: center; }
    .hint b { color: #ccd; }
  </style>
</head>
<body>
  <!-- 로그인 오버레이 -->
  <div id="login">
    <h1>심플 메이플 MMO</h1>
    <p>닉네임과 비밀번호로 접속하세요 (처음이면 자동 가입 · 진행도 저장됨)</p>
    <div class="fields">
      <input id="nick" type="text" maxlength="12" placeholder="닉네임 (최대 12자)" autocomplete="off" />
      <div class="row">
        <input id="pw" type="password" maxlength="32" placeholder="비밀번호" autocomplete="off" />
        <button id="startBtn">시작</button>
      </div>
    </div>
    <div id="loginErr"></div>
    <div class="hint">
      조작: <b>← →</b> 또는 <b>A D</b> 이동 &nbsp;|&nbsp; <b>↑ / W / Space</b> 점프 &nbsp;|&nbsp; <b>X</b> 공격
    </div>
  </div>

  <!-- 게임 캔버스 컨테이너 -->
  <div id="game"></div>

  <!-- 라이브러리: Socket.IO(서버 자동 제공) + Phaser(node_modules에서 서빙) -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/vendor/phaser.min.js"></script>

  <!-- 게임 스크립트 (번들러 없이 전역 객체로 연결) -->
  <script src="/js/net.js"></script>
  <script src="/js/scenes/BootScene.js"></script>
  <script src="/js/scenes/GameScene.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
